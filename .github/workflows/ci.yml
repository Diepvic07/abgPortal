name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-checks:
    name: Lint, test, and build
    runs-on: ubuntu-latest

    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-placeholder-secret
      GOOGLE_CLIENT_ID: ci-placeholder
      GOOGLE_CLIENT_SECRET: ci-placeholder
      GEMINI_API_KEY: ci-placeholder
      RESEND_API_KEY: ci-placeholder
      EMAIL_FROM: ABG Connect <onboarding@example.com>
      ADMIN_EMAILS: admin@example.com
      BLOB_READ_WRITE_TOKEN: ci-placeholder
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ci-placeholder
      VAPID_PRIVATE_KEY: ci-placeholder
      VAPID_SUBJECT: mailto:admin@example.com
      CRON_SECRET: ci-placeholder
      VERCEL_PROJECT_PRODUCTION_URL: example.com

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run unit tests
        run: npm run test

      - name: Build app
        run: npm run build
