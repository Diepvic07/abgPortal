<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 180" fill="none">
  <rect width="280" height="180" rx="12" fill="#F8FAFC"/>
  <!-- Dialog box -->
  <rect x="50" y="30" width="180" height="120" rx="14" fill="white" stroke="#E2E8F0" stroke-width="2"/>
  <!-- App icon preview -->
  <rect x="115" y="44" width="50" height="50" rx="12" fill="#DBEAFE"/>
  <text x="128" y="74" font-family="system-ui" font-size="14" font-weight="700" fill="#3B82F6">ABG</text>
  <!-- App name -->
  <text x="108" y="108" font-family="system-ui" font-size="10" fill="#475569">ABG Alumni Connect</text>
  <!-- Buttons -->
  <rect x="60" y="120" width="75" height="22" rx="6" fill="#F1F5F9"/>
  <text x="82" y="135" font-family="system-ui" font-size="10" fill="#64748B">Cancel</text>
  <!-- Add button highlighted -->
  <rect x="145" y="120" width="75" height="22" rx="6" fill="#3B82F6"/>
  <text x="170" y="135" font-family="system-ui" font-size="10" font-weight="600" fill="white">Add</text>
  <!-- Arrow pointing to Add -->
  <circle cx="182" cy="131" r="18" fill="none" stroke="#3B82F6" stroke-width="2" stroke-dasharray="4 3"/>
</svg>
