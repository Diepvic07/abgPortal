<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 180" fill="none">
  <rect width="280" height="180" rx="12" fill="#F8FAFC"/>
  <!-- Phone frame -->
  <rect x="90" y="15" width="100" height="150" rx="12" fill="white" stroke="#E2E8F0" stroke-width="2"/>
  <!-- Status bar -->
  <rect x="100" y="25" width="80" height="8" rx="4" fill="#F1F5F9"/>
  <!-- URL bar -->
  <rect x="100" y="38" width="80" height="12" rx="4" fill="#F1F5F9"/>
  <text x="140" y="47" font-family="system-ui" font-size="5" fill="#94A3B8" text-anchor="middle">abgalumni.vn</text>
  <!-- Content lines -->
  <rect x="100" y="58" width="80" height="6" rx="3" fill="#E2E8F0"/>
  <rect x="100" y="70" width="60" height="6" rx="3" fill="#E2E8F0"/>
  <rect x="100" y="82" width="70" height="6" rx="3" fill="#E2E8F0"/>
  <!-- Safari compass icon -->
  <circle cx="55" cy="90" r="22" fill="#3B82F6"/>
  <circle cx="55" cy="90" r="14" fill="white" opacity="0.2"/>
  <!-- Compass needle -->
  <polygon points="55,76 58,90 55,94 52,90" fill="white"/>
  <polygon points="55,104 52,90 55,86 58,90" fill="white" opacity="0.6"/>
  <!-- Safari label -->
  <text x="55" y="120" font-family="system-ui" font-size="9" font-weight="600" fill="#3B82F6" text-anchor="middle">Safari</text>
  <!-- Arrow from Safari to phone -->
  <path d="M78 90h8" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6" fill="#3B82F6"/>
    </marker>
  </defs>
  <!-- X over Chrome icon -->
  <circle cx="225" cy="90" r="18" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
  <circle cx="225" cy="85" r="8" fill="#F87171" opacity="0.3"/>
  <path d="M218,83 L232,97 M232,83 L218,97" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round"/>
  <text x="225" y="116" font-family="system-ui" font-size="7" fill="#EF4444" text-anchor="middle">Chrome</text>
</svg>
