  <text x="130" y="131" font-family="system-ui" font-size="8" font-weight="600" fill="#1E40AF">Install app</text>
  <rect x="110" y="142" width="120" height="18" rx="4" fill="#F1F5F9"/>
  <text x="118" y="155" font-family="system-ui" font-size="9" fill="#94A3B8">Settings</text>
  <!-- Arrow -->
  <path d="M40" y="127" width="50" height="0"/>
  <path d="M60 127l30 0" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
  <path d="M87 123l5 4-5 4" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
