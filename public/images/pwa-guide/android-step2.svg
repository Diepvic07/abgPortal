  <!-- Menu items -->
  <rect x="110" y="22" width="120" height="18" rx="4" fill="#F1F5F9"/>
  <text x="118" y="35" font-family="system-ui" font-size="9" fill="#94A3B8">New tab</text>
  <rect x="110" y="46" width="120" height="18" rx="4" fill="#F1F5F9"/>
  <text x="118" y="59" font-family="system-ui" font-size="9" fill="#94A3B8">New incognito tab</text>
  <rect x="110" y="70" width="120" height="18" rx="4" fill="#F1F5F9"/>
  <text x="118" y="83" font-family="system-ui" font-size="9" fill="#94A3B8">Bookmarks</text>
