<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 180" fill="none">
  <rect width="280" height="180" rx="12" fill="#F8FAFC"/>
  <!-- App icon on home screen -->
  <rect x="105" y="20" width="70" height="70" rx="16" fill="#1E293B"/>
  <text x="140" y="55" font-family="system-ui" font-size="10" font-weight="700" fill="white" text-anchor="middle">ABG</text>
  <text x="140" y="68" font-family="system-ui" font-size="7" fill="white" text-anchor="middle">Connect</text>
  <!-- App label -->
  <text x="140" y="105" font-family="system-ui" font-size="9" fill="#334155" text-anchor="middle">ABG Connect</text>
  <!-- Tap finger icon -->
  <circle cx="140" cy="55" r="30" fill="#3B82F6" opacity="0.1"/>
  <circle cx="140" cy="55" r="20" fill="#3B82F6" opacity="0.1"/>
  <!-- Arrow pointing down to notification toggle -->
  <path d="M140 115v20" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
  <path d="M135 130l5 5 5-5" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Notification toggle hint -->
  <rect x="85" y="140" width="110" height="28" rx="8" fill="white" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="110" y="157" font-family="system-ui" font-size="7" fill="#334155">Push Notifications</text>
  <!-- Toggle ON -->
  <rect x="170" y="148" width="18" height="10" rx="5" fill="#3B82F6"/>
  <circle cx="183" cy="153" r="4" fill="white"/>
</svg>
