<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none">
  <rect width="320" height="200" rx="16" fill="#F8FAFC"/>

  <!-- Phone lock screen background -->
  <rect x="85" y="8" width="150" height="184" rx="18" fill="#1E293B"/>
  <!-- Screen -->
  <rect x="90" y="14" width="140" height="172" rx="14" fill="#0F172A"/>

  <!-- Status bar -->
  <text x="104" y="30" font-family="system-ui" font-size="9" font-weight="600" fill="#94A3B8">14:38</text>
  <text x="200" y="30" font-family="system-ui" font-size="8" fill="#94A3B8">4G</text>

  <!-- Time display -->
  <text x="118" y="62" font-family="system-ui" font-size="22" font-weight="300" fill="white">14:38</text>
  <text x="115" y="76" font-family="system-ui" font-size="8" fill="#94A3B8">Monday, April 14</text>

  <!-- Notification 1 -->
  <rect x="96" y="88" width="128" height="42" rx="8" fill="rgba(255,255,255,0.12)"/>
  <rect x="102" y="94" width="18" height="18" rx="4" fill="#16A34A"/>
  <text x="109" y="106" font-family="system-ui" font-size="7" font-weight="700" fill="white">A</text>
  <text x="124" y="101" font-family="system-ui" font-size="7" font-weight="600" fill="white">New connection request</text>
  <text x="124" y="112" font-family="system-ui" font-size="6" fill="#CBD5E1">Minh Nguyen wants to</text>
  <text x="124" y="120" font-family="system-ui" font-size="6" fill="#CBD5E1">connect with you</text>
  <text x="195" y="101" font-family="system-ui" font-size="5.5" fill="#64748B">2m ago</text>

  <!-- Notification 2 -->
  <rect x="96" y="136" width="128" height="42" rx="8" fill="rgba(255,255,255,0.12)"/>
  <rect x="102" y="142" width="18" height="18" rx="4" fill="#16A34A"/>
  <text x="109" y="154" font-family="system-ui" font-size="7" font-weight="700" fill="white">A</text>
  <text x="124" y="149" font-family="system-ui" font-size="7" font-weight="600" fill="white">New event: ABG Meetup</text>
  <text x="124" y="160" font-family="system-ui" font-size="6" fill="#CBD5E1">A new event has been</text>
  <text x="124" y="168" font-family="system-ui" font-size="6" fill="#CBD5E1">published on ABG Alumni</text>
  <text x="195" y="149" font-family="system-ui" font-size="5.5" fill="#64748B">5m ago</text>

  <!-- Subtle glow effect -->
  <rect x="96" y="88" width="128" height="42" rx="8" fill="none" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
  <rect x="96" y="136" width="128" height="42" rx="8" fill="none" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
</svg>
