<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 180" fill="none">
  <rect width="280" height="180" rx="12" fill="#F8FAFC"/>
  <!-- Share sheet backdrop -->
  <rect x="50" y="10" width="180" height="160" rx="12" fill="white" stroke="#E2E8F0" stroke-width="2"/>
  <!-- Share sheet handle -->
  <rect x="125" y="16" width="30" height="4" rx="2" fill="#CBD5E1"/>
  <!-- Row items -->
  <rect x="62" y="30" width="156" height="20" rx="6" fill="#F1F5F9"/>
  <text x="70" y="44" font-family="system-ui" font-size="9" fill="#94A3B8">Copy</text>
  <rect x="62" y="56" width="156" height="20" rx="6" fill="#F1F5F9"/>
  <text x="70" y="70" font-family="system-ui" font-size="9" fill="#94A3B8">Add Bookmark</text>
  <rect x="62" y="82" width="156" height="20" rx="6" fill="#F1F5F9"/>
  <text x="70" y="96" font-family="system-ui" font-size="9" fill="#94A3B8">Add to Reading List</text>
  <!-- Highlighted row: Add to Home Screen -->
  <rect x="62" y="108" width="156" height="20" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <!-- Plus icon -->
  <rect x="68" y="113" width="10" height="10" rx="2" fill="#3B82F6"/>
  <path d="M73 115v6m-3-3h6" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
  <text x="82" y="122" font-family="system-ui" font-size="9" font-weight="600" fill="#1E40AF">Add to Home Screen</text>
  <!-- Arrow -->
  <path d="M230 118l10 0" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
  <path d="M237 114l5 4-5 4" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
