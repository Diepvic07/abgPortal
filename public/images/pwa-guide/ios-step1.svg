<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 180" fill="none">
  <rect width="280" height="180" rx="12" fill="#F8FAFC"/>
  <!-- Phone frame -->
  <rect x="90" y="15" width="100" height="150" rx="12" fill="white" stroke="#E2E8F0" stroke-width="2"/>
  <!-- Status bar -->
  <rect x="100" y="25" width="80" height="8" rx="4" fill="#F1F5F9"/>
  <!-- Safari bar -->
  <rect x="100" y="38" width="80" height="12" rx="4" fill="#F1F5F9"/>
  <!-- Content lines -->
  <rect x="100" y="58" width="80" height="6" rx="3" fill="#E2E8F0"/>
  <rect x="100" y="70" width="60" height="6" rx="3" fill="#E2E8F0"/>
  <rect x="100" y="82" width="70" height="6" rx="3" fill="#E2E8F0"/>
  <!-- Bottom bar with share button highlighted -->
  <rect x="100" y="140" width="80" height="15" rx="4" fill="#F1F5F9"/>
  <!-- Share icon (highlighted) -->
  <rect x="130" y="142" width="20" height="11" rx="3" fill="#3B82F6"/>
  <path d="M137 144v5m0 0l-2.5-2m2.5 2l2.5-2" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow pointing to share -->
  <circle cx="140" cy="147" r="18" fill="none" stroke="#3B82F6" stroke-width="2" stroke-dasharray="4 3"/>
</svg>
