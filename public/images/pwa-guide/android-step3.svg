<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 180" fill="none">
  <rect width="280" height="180" rx="12" fill="#F8FAFC"/>
  <!-- Dialog box -->
  <rect x="50" y="30" width="180" height="120" rx="14" fill="white" stroke="#E2E8F0" stroke-width="2"/>
  <!-- Title -->
  <text x="100" y="55" font-family="system-ui" font-size="11" font-weight="600" fill="#1E293B">Install app?</text>
  <!-- App info row -->
  <rect x="65" y="65" width="36" height="36" rx="8" fill="#DBEAFE"/>
  <text x="72" y="88" font-family="system-ui" font-size="11" font-weight="700" fill="#3B82F6">ABG</text>
  <text x="108" y="80" font-family="system-ui" font-size="9" fill="#475569">ABG Alumni Connect</text>
  <text x="108" y="93" font-family="system-ui" font-size="8" fill="#94A3B8">abg-connect.vercel.app</text>
  <!-- Buttons -->
  <text x="140" y="130" font-family="system-ui" font-size="10" fill="#64748B">Cancel</text>
  <!-- Install button highlighted -->
  <rect x="175" y="118" width="46" height="22" rx="6" fill="#3B82F6"/>
  <text x="183" y="133" font-family="system-ui" font-size="10" font-weight="600" fill="white">Install</text>
  <!-- Arrow pointing to Install -->
  <circle cx="198" cy="129" r="18" fill="none" stroke="#3B82F6" stroke-width="2" stroke-dasharray="4 3"/>
</svg>
